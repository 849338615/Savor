<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--savor-sage-mist); border-radius: 4px; width: 28px; }
  .name { font-size: 11px; color: var(--fg-1); font-weight: 600; font-family: var(--font-mono); }
  .val { font-size: 10px; color: var(--fg-2); font-family: var(--font-mono); }
</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="name">1</div><div class="val">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="name">2</div><div class="val">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="name">3</div><div class="val">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="name">4</div><div class="val">16</div></div>
    <div class="col"><div class="bar" style="height:20px"></div><div class="name">5</div><div class="val">20</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="name">6</div><div class="val">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="name">8</div><div class="val">32</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="name">10</div><div class="val">40</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="name">12</div><div class="val">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="name">16</div><div class="val">64</div></div>
    <div class="col"><div class="bar" style="height:80px"></div><div class="name">20</div><div class="val">80</div></div>
  </div>
</body></html>
