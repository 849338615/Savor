<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-app); display: flex; gap: 16px; }
  .card { flex: 1; background: var(--bg-surface); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); overflow: hidden; }
  .photo { aspect-ratio: 4 / 3; background: linear-gradient(135deg,#C9D8C6,#E7D9C2); position: relative; }
  .photo::after { content: ""; position: absolute; inset: 0; background-image: radial-gradient(circle at 30% 40%, rgba(123,164,137,0.5), transparent 60%), radial-gradient(circle at 70% 70%, rgba(146,163,125,0.4), transparent 55%); }
  .meta { padding: 14px 16px 16px; }
  .title { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--fg-1); margin: 0 0 4px; line-height: 1.25; }
  .sub { font-size: 13px; color: var(--fg-2); display: flex; align-items: center; gap: 8px; }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--fg-3); }
  .bookmark { position: absolute; top: 12px; right: 12px; background: rgba(250,247,242,0.9); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
</style></head><body>
  <div class="card">
    <div class="photo"><div class="bookmark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1F4D3A" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg></div></div>
    <div class="meta">
      <h3 class="title">Creamy Garlic Pasta</h3>
      <div class="sub">25 min<span class="dot"></span>Easy<span class="dot"></span>4 servings</div>
    </div>
  </div>
  <div class="card">
    <div class="photo" style="background:linear-gradient(135deg,#92A37D,#7BA489)"><div class="bookmark"><svg width="14" height="14" viewBox="0 0 24 24" fill="#1F4D3A" stroke="#1F4D3A" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg></div></div>
    <div class="meta">
      <h3 class="title">Lemon Herb Salmon</h3>
      <div class="sub">20 min<span class="dot"></span>Easy<span class="dot"></span>2 servings</div>
    </div>
  </div>
</body></html>
