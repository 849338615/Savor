<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-app); display: flex; gap: 14px; flex-wrap: wrap; }
  .swatch { width: 88px; }
  .demo { width: 100%; aspect-ratio: 1.4 / 1; background: var(--bg-surface); border: 1px solid var(--border-hairline); }
  .label { margin-top: 8px; font-size: 11px; color: var(--fg-2); font-family: var(--font-mono); }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 600; }
</style></head><body>
  <div class="swatch"><div class="demo" style="border-radius:4px"></div><div class="name">xs</div><div class="label">4px</div></div>
  <div class="swatch"><div class="demo" style="border-radius:8px"></div><div class="name">sm</div><div class="label">8px</div></div>
  <div class="swatch"><div class="demo" style="border-radius:12px"></div><div class="name">md</div><div class="label">12px</div></div>
  <div class="swatch"><div class="demo" style="border-radius:16px"></div><div class="name">lg · default</div><div class="label">16px</div></div>
  <div class="swatch"><div class="demo" style="border-radius:20px"></div><div class="name">xl</div><div class="label">20px</div></div>
  <div class="swatch"><div class="demo" style="border-radius:28px"></div><div class="name">2xl · hero</div><div class="label">28px</div></div>
  <div class="swatch"><div class="demo" style="border-radius:999px"></div><div class="name">pill</div><div class="label">999</div></div>
</body></html>
