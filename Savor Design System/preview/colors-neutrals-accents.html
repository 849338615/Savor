<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-app); }
  .row { display: flex; gap: 14px; align-items: stretch; }
  .swatch { flex: 1; aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; border: 1px solid var(--border-hairline); }
  .swatch.dark { color: var(--fg-on-brand); border-color: transparent; }
  .swatch .name { font-size: 12px; font-weight: 600; line-height: 1.2; }
  .swatch .hex { font-size: 11px; font-family: var(--font-mono); opacity: 0.75; margin-top: 2px; letter-spacing: 0.02em; }
</style></head><body>
  <div class="row">
    <div class="swatch dark" style="background:#232323"><div class="name">Charcoal</div><div class="hex">#232323</div></div>
    <div class="swatch dark" style="background:#6E6B66"><div class="name">Stone Gray</div><div class="hex">#6E6B66</div></div>
    <div class="swatch" style="background:#D9D5CF"><div class="name">Mist Gray</div><div class="hex">#D9D5CF</div></div>
    <div class="swatch" style="background:#EFE7DA"><div class="name">Pale Linen</div><div class="hex">#EFE7DA</div></div>
    <div class="swatch dark" style="background:#92A37D"><div class="name">Muted Olive · accent</div><div class="hex">#92A37D</div></div>
    <div class="swatch" style="background:#C7A969;color:#1F4D3A"><div class="name">Gold · sparingly</div><div class="hex">#C7A969</div></div>
  </div>
</body></html>
