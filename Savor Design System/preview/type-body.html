<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-app); }
  .specimen { display: flex; align-items: baseline; gap: 24px; padding: 8px 0; }
  .specimen .meta { width: 120px; flex-shrink: 0; font-size: 11px; color: var(--fg-2); letter-spacing: 0.02em; }
  .meta b { display: block; color: var(--fg-1); font-weight: 600; font-size: 12px; }
  .body-line { font-size: 16px; color: var(--fg-1); line-height: 1.55; max-width: 460px; margin: 0; }
  .small-line { font-size: 14px; color: var(--fg-2); line-height: 1.5; margin: 0; }
  .cap-line { font-size: 12px; color: var(--fg-2); margin: 0; }
</style></head><body>
  <div class="specimen">
    <div class="meta"><b>Body · Inter</b>16 / Regular</div>
    <p class="body-line">Cook the pasta in a large pot of salted water until al dente.</p>
  </div>
  <div class="specimen">
    <div class="meta"><b>Small · Inter</b>14 / Medium</div>
    <p class="small-line">Saved for later · 25&nbsp;min · Easy</p>
  </div>
  <div class="specimen">
    <div class="meta"><b>Caption · Inter</b>12 / Regular</div>
    <p class="cap-line">200g spaghetti · 3 tbsp olive oil · 3 cloves garlic, minced</p>
  </div>
  <div class="specimen">
    <div class="meta"><b>Eyebrow</b>12 / 0.18em</div>
    <span class="eyebrow">Our mission</span>
  </div>
</body></html>
