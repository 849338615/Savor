<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-app); display: flex; flex-direction: column; gap: 14px; }
  .field {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-surface); border: 1px solid var(--border-hairline);
    border-radius: var(--radius-pill); padding: 14px 20px;
  }
  .field.focus { border-color: var(--fg-brand); box-shadow: var(--shadow-focus); }
  .field input { flex: 1; border: 0; outline: 0; font-family: var(--font-body); font-size: 15px; color: var(--fg-1); background: transparent; }
  .field input::placeholder { color: var(--fg-3); }
  svg { color: var(--fg-2); flex-shrink: 0; }
</style></head><body>
  <div class="field">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    <input placeholder="Search recipes, ingredients…">
  </div>
  <div class="field focus">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    <input value="Creamy garlic pasta">
  </div>
</body></html>
