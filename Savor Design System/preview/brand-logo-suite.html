<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-app); display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item img { object-fit: contain; }
  .name { font-size: 11px; color: var(--fg-2); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
</style></head><body>
  <div class="item"><img style="width:180px;max-height:180px" src="../assets/savor-logo-primary.png"><div class="name">Primary</div></div>
  <div class="item"><img style="width:200px;max-height:80px" src="../assets/savor-logo-horizontal.png"><div class="name">Horizontal</div></div>
  <div class="item"><img style="width:88px;height:88px" src="../assets/savor-icon-mark.png"><div class="name">Icon mark</div></div>
  <div class="item"><img style="width:88px;height:88px;border-radius:20px" src="../assets/savor-app-icon-primary.png"><div class="name">App icon</div></div>
</body></html>
