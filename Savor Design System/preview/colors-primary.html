<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-app); }
  .row { display: flex; gap: 14px; align-items: stretch; }
  .swatch { flex: 1; aspect-ratio: 1.4 / 1; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; border: 1px solid var(--border-hairline); }
  .swatch.dark { color: var(--fg-on-brand); border-color: transparent; }
  .swatch .name { font-size: 12px; font-weight: 600; line-height: 1.2; }
  .swatch .hex { font-size: 11px; font-family: var(--font-mono); opacity: 0.75; margin-top: 2px; letter-spacing: 0.02em; }
</style></head><body>
  <div class="row">
    <div class="swatch dark" style="background:#1F4D3A"><div class="name">Forest Green</div><div class="hex">#1F4D3A</div></div>
    <div class="swatch dark" style="background:#7BA489"><div class="name">Soft Sage</div><div class="hex">#7BA489</div></div>
    <div class="swatch" style="background:#C9D8C6"><div class="name">Sage Mist</div><div class="hex">#C9D8C6</div></div>
    <div class="swatch" style="background:#E7D9C2"><div class="name">Warm Sand</div><div class="hex">#E7D9C2</div></div>
    <div class="swatch" style="background:#F6F1E8"><div class="name">Warm Cream</div><div class="hex">#F6F1E8</div></div>
    <div class="swatch" style="background:#FAF7F2"><div class="name">Soft White</div><div class="hex">#FAF7F2</div></div>
  </div>
</body></html>
