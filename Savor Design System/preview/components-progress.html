<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-app); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .label { font-size: 13px; color: var(--fg-2); width: 90px; flex-shrink: 0; font-weight: 500; }
  .track { flex: 1; height: 6px; background: var(--savor-mist); border-radius: 999px; overflow: hidden; }
  .fill { height: 100%; background: var(--savor-forest); border-radius: 999px; }
  .fill.sage { background: var(--savor-sage); }
  .step { font-size: 13px; color: var(--fg-1); font-weight: 600; font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }
</style></head><body>
  <div class="row"><span class="label">Step 3 of 8</span><div class="track"><div class="fill" style="width:37.5%"></div></div><span class="step">37%</span></div>
  <div class="row"><span class="label">Step 6 of 8</span><div class="track"><div class="fill" style="width:75%"></div></div><span class="step">75%</span></div>
  <div class="row"><span class="label">Soft variant</span><div class="track" style="background:#EFE7DA"><div class="fill sage" style="width:50%"></div></div><span class="step">50%</span></div>
</body></html>
