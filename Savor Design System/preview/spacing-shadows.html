<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-cream); display: flex; gap: 18px; flex-wrap: wrap; }
  .box { width: 130px; height: 100px; background: var(--bg-surface); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); }
</style></head><body>
  <div class="box" style="box-shadow: 0 1px 2px rgba(35,35,35,.04)"><div class="name">xs</div><div class="val">0 1 2 / .04</div></div>
  <div class="box" style="box-shadow: 0 2px 8px rgba(35,35,35,.05)"><div class="name">sm · default</div><div class="val">0 2 8 / .05</div></div>
  <div class="box" style="box-shadow: 0 8px 24px rgba(35,35,35,.06)"><div class="name">md</div><div class="val">0 8 24 / .06</div></div>
  <div class="box" style="box-shadow: 0 16px 40px rgba(35,35,35,.08)"><div class="name">lg</div><div class="val">0 16 40 / .08</div></div>
  <div class="box" style="box-shadow: 0 0 0 3px rgba(31,77,58,.18); background:var(--bg-surface)"><div class="name">focus ring</div><div class="val">forest 18%</div></div>
</body></html>
