<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg-app); }
  .specimen { display: flex; align-items: baseline; gap: 24px; padding: 8px 0; }
  .specimen .meta { width: 120px; flex-shrink: 0; font-size: 11px; color: var(--fg-2); font-family: var(--font-body); letter-spacing: 0.02em; }
  .meta b { display: block; color: var(--fg-1); font-weight: 600; font-size: 12px; }
</style></head><body>
  <div class="specimen">
    <div class="meta"><b>H1 · Display</b>52 / Bold</div>
    <h1 style="margin:0">Calm cooking</h1>
  </div>
  <div class="specimen">
    <div class="meta"><b>H2 · Display</b>36 / Semibold</div>
    <h2 style="margin:0">Here's what you'll need</h2>
  </div>
  <div class="specimen">
    <div class="meta"><b>H3 · Display</b>26 / Semibold</div>
    <h3 style="margin:0">Step three of eight</h3>
  </div>
</body></html>
